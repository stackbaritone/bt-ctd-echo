# Netlify configuration
# This project is hosted on GitHub Pages; Netlify is used only for the
# serverless function that proxies GitHub API writes (no static hosting here).

[build]
  # No static build — functions only
  command   = ""
  functions = "netlify/functions"

[build.environment]
  # admin-simple.js is a standalone file (not processed by Vite) that
  # legitimately contains the admin hash — exclude from secrets scan
  SECRETS_SCAN_OMIT_PATHS = "assets/admin-simple.js,public/assets/admin-simple.js"

[functions]
  node_bundler = "esbuild"

# Allow the function to be called cross-origin from the GitHub Pages domain
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://bt-ctd-echo.bt-tb.ca"
