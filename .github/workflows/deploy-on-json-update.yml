name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and deploy
        run: |
          npm run build
          npx gh-pages -d dist --dotfiles --no-history --repo https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_ADMIN_HASH: ${{ secrets.VITE_ADMIN_HASH }}
          VITE_MODE_HASH_GESTION: ${{ secrets.VITE_MODE_HASH_GESTION }}
          VITE_MODE_HASH_EQUIPE_ADMIN: ${{ secrets.VITE_MODE_HASH_EQUIPE_ADMIN }}
          VITE_MODE_HASH_RELATIONS_FOURNISSEURS: ${{ secrets.VITE_MODE_HASH_RELATIONS_FOURNISSEURS }}
          VITE_MODE_HASH_CAP: ${{ secrets.VITE_MODE_HASH_CAP }}
